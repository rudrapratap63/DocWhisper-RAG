services:
  postgres:
    image: postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: docwhisper
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  valkey:
    image: valkey/valkey
    ports:
      - "6379:6379"

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=valkey
      - DATABASE_URL=postgresql+psycopg://user:password@postgres/docwhisper
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - .:/app
    depends_on:
      - valkey
      - postgres
      - qdrant

  worker:
    build: .
    command: rq worker -u redis://valkey:6379
    environment:
      - REDIS_HOST=valkey
      - DATABASE_URL=postgresql+psycopg://user:password@postgres/docwhisper
      - QDRANT_URL=http://qdrant:6333
    volumes:
      - .:/app
    depends_on:
      - valkey
      - postgres
      - qdrant

volumes:
  postgres_data:
  qdrant_data: